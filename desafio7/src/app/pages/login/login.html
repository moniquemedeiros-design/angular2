<div class="login-container">

  <div class="conteudo">

    <!-- Esquerda -->
    <div class="lado-esquerdo">
      <img src="img/ranger.png" alt="Ford Ranger">
    </div>

    <!-- Direita -->
    <div class="lado-direito">

      <div class="formulario">

        <!-- Logo -->
        <div class="logo">
          <img src="img/ford.png" alt="Ford">
        </div>

        <h1>Boas-vindas</h1>

        <!-- EMAIL -->
        <div class="linha-campo">

          <div class="campo">
            <span class="icone">👤</span>

            <input type="email" placeholder="Insira seu e-mail">

          </div>

          <span class="info">ⓘ</span>

        </div>

        <!-- SENHA -->
        <div class="linha-campo">

          <div class="campo">
            <span class="icone">🔒</span>

            <input type="password" placeholder="Insira sua senha">

            <span class="olho">👁</span>

          </div>

        </div>

        <!-- SWITCH -->
        <div class="linha-switch">

          <span class="texto-switch">
            Logar automaticamente
          </span>

          <label class="switch">
            <input type="checkbox">
            <span class="slider"></span>
          </label>

          <span class="info">ⓘ</span>

        </div>

        <button class="btn-entrar" (click)="entrar()">
          Entrar
        </button>

      </div>

    </div>

  </div>

</div>
